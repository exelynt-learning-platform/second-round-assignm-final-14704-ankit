# Test DataSource - MySQL (real database - same as production)
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=manager

# JPA/Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=MyVerySecureSecretKeyForJWTTokenSigningThatIsAtLeast256BitsLongForHS256Algorithm
app.jwt.expiration=86400000

# Stripe Configuration
stripe.api-key=sk_test_your_stripe_key_here

# Server
server.servlet.context-path=/api
