# Application Configuration
spring.application.name=ecommerce-backend










# DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.username=root
spring.datasource.password=manager

# JPA/Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true

# SpringDoc OpenAPI (Swagger) Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.doc-expansion=list
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=false

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# JWT Configuration
app.jwt.secret=${JWT_SECRET:MyVerySecureSecretKeyForJWTTokenSigningThatIsAtLeast256BitsLongForHS256Algorithm}
app.jwt.expiration=86400000

# Stripe Configuration
stripe.api-key=${STRIPE_API_KEY:sk_test_your_stripe_key_here}
